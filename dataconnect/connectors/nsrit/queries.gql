query GetTeachers($branchId: UUID!, $limit: Int = 50, $offset: Int = 0) @auth(level: USER) {
  currentUser: users(
    where: {
      _and: [
        {firebaseUID: {eq_expr: "auth.uid"}}
        {isActive: {eq: true}}
        {
          _or: [
            {role: {in: ["MAIN_ADMIN", "main_admin"]}}
            {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
            {branches_on_principal: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
            {branches_on_branchAdmin: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
            {coordinators_on_user: {exist: {branchId: {eq: $branchId}, isActive: {eq: true}}}}
            {
              _and: [
                {branchId: {eq: $branchId}}
                {
                  _or: [
                    {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}
                    {userRoles_on_user: {exist: {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}}}
                    ]
                }
              ]
            }
          ]
        }
      ]
    }
    limit: 1
  ) @redact @check(expr: "this.exists(u, true)", message: "Branch teacher access required") {
    id
    role
    branchId
  }
  teachers(where: {branchId: {eq: $branchId}}, orderBy: {createdAt: DESC}, limit: $limit, offset: $offset) {
    id
    userId
    employeeId
    staffType
    branchId
    wing @retired
    joiningDate
    designation
    gender
    email
    qualification
    experience
    isActive
    user {
      id
      fullName
      phoneNumber
      countryCode
      role
      staffType
      isActive
      roles: userRoles_on_user {
        role
      }
    }
    teacherSubjects_on_teacher {
      id
      subject {
        id
        name
        code
        status
      }
    }
    teacherSectionAssignments_on_teacher {
      id
      sectionId
      isClassTeacher
      section {
        id
        name
        academicYear
        academicClass {
          id
          name
          wing {
            code
            name
          }
        }
      }
    }
  }
}

