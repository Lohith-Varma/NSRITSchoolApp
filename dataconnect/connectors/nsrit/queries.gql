query GetCoordinators($branchId: UUID!) @auth(level: USER) {
  currentUser: users(
    where: {
      _and: [
        {firebaseUID: {eq_expr: "auth.uid"}}
        {isActive: {eq: true}}
        {
          _or: [
            {role: {in: ["MAIN_ADMIN", "main_admin"]}}
            {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
            {branches_on_principal: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
            {branches_on_branchAdmin: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
            {coordinators_on_user: {exist: {branchId: {eq: $branchId}, isActive: {eq: true}}}}
            {
              _and: [
                {branchId: {eq: $branchId}}
                {
                  _or: [
                    {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}
                    {userRoles_on_user: {exist: {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}}}
                    ]
                }
              ]
            }
          ]
        }
      ]
    }
    limit: 1
  ) @redact @check(expr: "this.exists(u, true)", message: "Branch access required") {
    id
    role
    branchId
  }
  coordinators(where: {branchId: {eq: $branchId}, isActive: {eq: true}}, orderBy: {createdAt: DESC}, limit: 500) {
    id
    userId
    branchId
    wing
    employeeId
    staffType
    gender
    email
    isActive
    user {
      id
      fullName
      countryCode
      phoneNumber
      role
      staffType
      branchId
      isActive
      roles: userRoles_on_user {
        role
      }
      teacherProfile: teacher_on_user {
        id
        userId
        employeeId
        staffType
        branchId
        joiningDate
        designation
        gender
        email
        isActive
        classTeacherAssignments: teacherSectionAssignments_on_teacher {
          id
          sectionId
          isClassTeacher
          isActive
          createdAt
          section {
            id
            name
            academicClass {
              id
              name
              wing {
                code
                name
              }
            }
          }
        }
      }
    }
  }
}

