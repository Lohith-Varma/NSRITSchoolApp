query GetParentChildren($parentId: UUID!) @auth(level: USER) {
  currentParent: parents(
    where: {id: {eq: $parentId}, user: {firebaseUID: {eq_expr: "auth.uid"}}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(p, true)", message: "Parent profile access required") {
    id
  }
  students(where: {parentId: {eq: $parentId}, isActive: {eq: true}, status: {eq: "ACTIVE"}}) {
    id
    studentId
    fullName
    gender
    dateOfBirth
    branchId
    academicClassId
    sectionId
    parentId
    phoneNumber
    admissionYear
    branchCode
    admissionDate
    status
    academicClass {
      id
      name
      wing {
        id
        code
        name
      }
    }
    section {
      id
      name
      academicYear
      classTeacher {
        id
        fullName
        phoneNumber
      }
    }
    parent {
      id
      fullName
      fatherName
      motherName
      countryCode
      phoneNumber
      address
    }
    recentAttendance: attendances_on_student(orderBy: {attendanceDate: DESC}, limit: 10) {
      id
      attendanceDate
      status
      remarks
    }
    attendance: attendances_on_student(limit: 500) {
      id
      attendanceDate
      status
    }
    fees: studentFees_on_student(limit: 100) {
      id
      totalFee
      paidAmount
      remainingAmount
      status
      dueDate
    }
    parentFeePlans: studentFeePlans_on_student(orderBy: {academicYear: DESC}, limit: 10) {
      id
      academicYear
      classFeeTemplateId
      term1Fee
      term2Fee
      term3Fee
      booksFee
      transportFee
      concessionType
      concessionValue
      concessionAmount
      grossAmount
      totalAmount
      isActive
      classFeeTemplate {
        id
        totalTuitionFee
        applyToFuture
        status
      }
      parentFeeItems: studentFeeItems_on_feePlan {
        id
        amount
        category {
          id
          name
        }
      }
      parentFeePayments: feePayments_on_feePlan(orderBy: {paymentDate: DESC}, limit: 100) {
        id
        amount
        paymentDate
        paymentMode
        referenceNumber
        receiptNumber
        status
        reversedAt
        reverseReason
        remarks
        collectedBy {
          id
          fullName
        }
      }
    }
  }
}

