      name
      academicClass {
        id
        name
      }
    }
  }
}

# ── Suggestions ──────────────────────────────────────────────────────────────

query GetSuggestionsByParent($parentId: UUID!, $limit: Int = 50) @auth(level: USER) {
  suggestions(
    where: {parentId: {eq: $parentId}}
    orderBy: {createdAt: DESC}
    limit: $limit
  ) {
    id
    parentId
    studentId
    branchId
    title
    message
    status
    response
    createdAt
    updatedAt
    student {
      id
      fullName
    }
  }
}

query GetSuggestionsByBranch($branchId: UUID!, $limit: Int = 100) @auth(level: USER) {
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, (u.role == 'PRINCIPAL' || u.role == 'principal' || u.role == 'MAIN_ADMIN' || u.role == 'main_admin') && (u.branchId == vars.branchId || u.role == 'MAIN_ADMIN' || u.role == 'main_admin'))", message: "Principal or Main Admin required") {
    id
    role
    branchId
  }
  suggestions(
    where: {branchId: {eq: $branchId}}
    orderBy: {createdAt: DESC}
    limit: $limit
  ) {
    id
    parentId
    studentId
    branchId
    title
    message
    status
    response
    createdAt
    updatedAt
    parent {
      id
      fullName
      phoneNumber
    }
    student {
      id
      fullName
    }
  }
}
