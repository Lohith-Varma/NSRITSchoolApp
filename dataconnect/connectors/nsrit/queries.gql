query GetCurrentUser($firebaseUID: String!) @auth(level: USER) {
  users(where: {firebaseUID: {eq: $firebaseUID}, isActive: {eq: true}}, limit: 1) {
    id
    firebaseUID
    fullName
    countryCode
    phoneNumber
    status
    role
    employeeId
    staffType
    branchId
    wingId
    branch {
      id
      branchCode
      name
    }
    branchAdminBranches: branches_on_branchAdmin {
      id
      branchCode
      name
    }
    principalBranches: branches_on_principal {
      id
      branchCode
      name
    }
    coordinatorProfiles: coordinators_on_user {
      id
      branchId
      wing
    }
    teacherProfile: teacher_on_user {
      id
      branchId
    }
    accountantProfile: accountant_on_user {
      id
      branchId
    }
    roles: userRoles_on_user {
      id
      role
      createdAt
    }
    isActive
  }
}

query GetUserByPhone($phoneNumber: String!) @auth(level: USER) {
