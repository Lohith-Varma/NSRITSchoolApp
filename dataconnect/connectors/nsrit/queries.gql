query GetStudents(
  $branchId: UUID!
  $limit: Int = 50
  $offset: Int = 0
) @auth(level: USER) {
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, (u.branchId == vars.branchId) || u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Branch access required") {
    id
    role
    branchId
  }
  students(
    where: {branchId: {eq: $branchId}, isActive: {eq: true}}
    orderBy: {createdAt: DESC}
    limit: $limit
    offset: $offset
  ) {
    id
    studentId
    admissionYear
    branchCode
    serialNumber
    fullName
    gender
    dateOfBirth
    photoUrl
    aadhaarNumber
