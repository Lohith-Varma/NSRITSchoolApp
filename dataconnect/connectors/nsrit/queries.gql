query GetParentByPhone($branchId: UUID!, $phoneNumber: String!) @auth(level: USER) {
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, ((u.role == 'PRINCIPAL' || u.role == 'principal' || u.role == 'COORDINATOR' || u.role == 'coordinator') && u.branchId == vars.branchId) || u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Parent lookup access required") {
    id
    role
    branchId
  }
  parents(
    where: {branchId: {eq: $branchId}, phoneNumber: {eq: $phoneNumber}, isActive: {eq: true}}
    limit: 1
  ) {
    id
    userId
    branchId
    fullName
    fatherName
    motherName
    countryCode
    phoneNumber
    address
    isActive
  }
}

