query GetUsersByRole(
  $role: String!
  $alternateRole: String!
  $searchText: String!
  $limit: Int = 25
) @auth(level: USER) {
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Main Admin required") {
    id
    role
  }
  users(
    where: {
      _and: [
        {isActive: {eq: true}}
        {_or: [{role: {eq: $role}}, {role: {eq: $alternateRole}}]}
        {
          _or: [
            {fullName: {contains: $searchText}}
            {phoneNumber: {contains: $searchText}}
          ]
        }
      ]
    }
    limit: $limit
  ) {
    id
    fullName
    phoneNumber
    role
    branchId
    isActive
  }
}

