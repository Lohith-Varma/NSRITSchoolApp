query GetPaymentHistory(
  $branchId: UUID!
  $studentId: UUID
  $fromDate: Date
  $toDate: Date
  $limit: Int = 200
  $offset: Int = 0
) @auth(level: USER) {
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, ((u.role == 'COORDINATOR' || u.role == 'coordinator' || u.role == 'ACCOUNTANT' || u.role == 'accountant' || u.role == 'PRINCIPAL' || u.role == 'principal' || u.role == 'BRANCH_ADMIN' || u.role == 'branch_admin') && u.branchId == vars.branchId) || u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Payment history access required") {
    id
    role
    branchId
  }
  feePayments(
    where: {
      student: {branchId: {eq: $branchId}}
      studentId: {eq: $studentId}
      paymentDate: {ge: $fromDate, le: $toDate}
    }
    orderBy: {paymentDate: DESC}
    limit: $limit
    offset: $offset
  ) {
    id
    studentId
    feePlanId
    amount
    paymentDate
    paymentMode
    referenceNumber
    receiptNumber
    status
    reversedAt
    reverseReason
    remarks
    student {
      id
      studentId
      fullName
      academicClass {
        id
        name
        wing {
          id
          code
          name
        }
      }
      section {
        id
        name
      }
      branch {
        id
        name
        branchCode
      }
    }
    collectedBy {
      id
      fullName
    }
    reversedBy {
      id
      fullName
    }
  }
}

