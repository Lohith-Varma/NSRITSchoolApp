query GetGlobalStudentExplorer(
  $branchId: UUID
  $academicClassId: UUID
  $sectionId: UUID
  $status: String
  $searchText: String! = ""
  $limit: Int = 25
  $offset: Int = 0
) @auth(level: USER) {
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Main Admin required") {
    id
    role
  }
  students(
    where: {
      _and: [
        {branchId: {eq: $branchId}}
        {academicClassId: {eq: $academicClassId}}
        {sectionId: {eq: $sectionId}}
        {status: {eq: $status}}
        {
          _or: [
            {studentId: {contains: $searchText}}
            {fullName: {contains: $searchText}}
            {phoneNumber: {contains: $searchText}}
            {parent: {phoneNumber: {contains: $searchText}}}
            {parent: {fatherName: {contains: $searchText}}}
            {parent: {motherName: {contains: $searchText}}}
          ]
        }
      ]
    }
    orderBy: {fullName: ASC}
    limit: $limit
    offset: $offset
  ) {
    id
    studentId
    fullName
    gender
    branchId
    wingId
    academicClassId
    sectionId
    parentId
    phoneNumber
    admissionDate
    status
    isActive
    branch {
      id
      name
      branchCode
    }
    academicClass {
      id
      name
      wing {
        id
        code
        name
      }
    }
    section {
      id
      name
    }
    parent {
      id
      fullName
      fatherName
      motherName
      phoneNumber
      email
    }
    explorerAttendance: attendances_on_student(limit: 500) {
      id
      status
    }
    explorerFeePlans: studentFeePlans_on_student(limit: 10) {
      id
      totalAmount
      explorerFeePayments: feePayments_on_feePlan(limit: 200) {
        id
        amount
        status
      }
    }
  }
}

