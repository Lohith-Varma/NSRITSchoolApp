  academicClass_insert(
    data: {
      branch: {id: $branchId}
      wing: {id: $wingId}
      name: $name
      classCode: $classCode
      sortOrder: $sortOrder
      isActive: $isActive
      updatedAt_expr: "request.time"
    }
  )
}

