mutation CreateBranch(
  $name: String!
  $branchCode: String!
  $address: String
  $city: String
  $state: String
  $pincode: String
  $phone: String
  $email: String
  $status: String = "ACTIVE"
) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Main Admin required") {
      id
      role
    }
    existingBranches: branches(
      where: {branchCode: {eq: $branchCode}}
      limit: 1
    ) @check(expr: "!this.exists(b, true)", message: "Branch code already exists") {
      id
    }
  }
  branch_insert(
    data: {
      name: $name
      branchCode: $branchCode
      address: $address
      city: $city
      state: $state
      pincode: $pincode
      phone: $phone
      email: $email
      status: $status
      isActive: true
      updatedAt_expr: "request.time"
    }
  )
}

