mutation RecordPayment(
  $studentId: UUID!
  $feePlanId: UUID!
  $amount: Float!
  $paymentDate: Date!
  $paymentMode: String!
  $referenceNumber: String
  $receiptNumber: String!
  $remarks: String
  $collectedById: UUID!
  $branchId: UUID!
  $receiptYear: Int!
  $branchCode: String!
  $receiptSequence: Int!
  $actorRole: String
  $oldValue: String
  $newValue: String
) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, ((u.role == 'ACCOUNTANT' || u.role == 'accountant') && u.branchId == vars.branchId) || ((u.role == 'PRINCIPAL' || u.role == 'principal') && u.branchId == vars.branchId) || u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Fee collection branch access required") {
      id
      role
      branchId
    }
    students(where: {id: {eq: $studentId}, branchId: {eq: $branchId}}, limit: 1) @check(expr: "this.exists(s, true)", message: "Student not found in branch") {
      id
    }
  }
  receiptSequence_upsert(
    data: {
      year: $receiptYear
      branchCode: $branchCode
      lastSequence: $receiptSequence
      updatedAt_expr: "request.time"
    }
  )
  feePayment_insert(
    data: {
      student: {id: $studentId}
      feePlan: {id: $feePlanId}
      amount: $amount
      paymentDate: $paymentDate
      paymentMode: $paymentMode
      referenceNumber: $referenceNumber
      receiptNumber: $receiptNumber
      remarks: $remarks
      collectedBy: {id: $collectedById}
      status: "RECORDED"
      updatedAt_expr: "request.time"
    }
  )
  feeAuditLog_insert(
    data: {
      user: {id: $collectedById}
      role: $actorRole
      action: "PAYMENT_RECORDED"
      student: {id: $studentId}
      oldValue: $oldValue
      newValue: $newValue
    }
  )
}

mutation UpdatePayment(
  $paymentId: UUID!
  $studentId: UUID!
  $branchId: UUID!
  $amount: Float!
  $paymentDate: Date!
  $paymentMode: String!
  $referenceNumber: String
  $remarks: String
  $updatedById: UUID!
  $actorRole: String
  $oldValue: String
  $newValue: String
) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, ((u.role == 'ACCOUNTANT' || u.role == 'accountant') && u.branchId == vars.branchId) || ((u.role == 'PRINCIPAL' || u.role == 'principal') && u.branchId == vars.branchId) || u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Fee collection branch access required") {
      id
      role
      branchId
    }
    feePayments(
      where: {id: {eq: $paymentId}, studentId: {eq: $studentId}, student: {branchId: {eq: $branchId}}, paymentDate: {eq: $paymentDate}, status: {eq: "RECORDED"}}
      limit: 1
    ) @check(expr: "this.exists(p, true)", message: "Only same-day recorded payments can be edited") {
      id
    }
  }
  feePayment_update(
    id: $paymentId
    data: {
      amount: $amount
      paymentMode: $paymentMode
      referenceNumber: $referenceNumber
      remarks: $remarks
      updatedAt_expr: "request.time"
    }
  )
  feeAuditLog_insert(
    data: {
      user: {id: $updatedById}
      role: $actorRole
      action: "PAYMENT_EDITED"
      student: {id: $studentId}
      oldValue: $oldValue
      newValue: $newValue
    }
  )
}

mutation ReversePayment(
  $paymentId: UUID!
  $studentId: UUID!
  $branchId: UUID!
  $reversedById: UUID!
  $reason: String
  $actorRole: String
  $oldValue: String
  $newValue: String
) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, ((u.role == 'ACCOUNTANT' || u.role == 'accountant' || u.role == 'PRINCIPAL' || u.role == 'principal') && u.branchId == vars.branchId) || u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Payment reversal access required") {
      id
      role
      branchId
    }
    feePayments(
      where: {id: {eq: $paymentId}, studentId: {eq: $studentId}, student: {branchId: {eq: $branchId}}, status: {eq: "RECORDED"}}
      limit: 1
    ) @check(expr: "this.exists(p, true)", message: "Recorded payment not found in branch") {
      id
    }
  }
  feePayment_update(
    id: $paymentId
    data: {
      status: "REVERSED"
      reversedBy: {id: $reversedById}
      reversedAt_expr: "request.time"
      reverseReason: $reason
      updatedAt_expr: "request.time"
    }
  )
  feeAuditLog_insert(
    data: {
      user: {id: $reversedById}
      role: $actorRole
      action: "PAYMENT_REVERSED"
      student: {id: $studentId}
      oldValue: $oldValue
      newValue: $newValue
    }
  )
}

mutation RecordAuditLog(
  $performedBy: String!
  $performedRole: String!
  $actingAs: String
  $branchId: UUID
  $action: String!
  $entityType: String
  $entityId: String
  $oldData: String
  $newData: String
) @auth(level: USER) @transaction {
  query @redact {
    currentUser: users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Main Admin required") {
      id
      role
    }
  }
  auditLog_insert(
    data: {
      performedBy: $performedBy
      performedRole: $performedRole
      actingAs: $actingAs
      branchId: $branchId
      action: $action
      entityType: $entityType
      entityId: $entityId
      oldData: $oldData
      newData: $newData
    }
  )
}
