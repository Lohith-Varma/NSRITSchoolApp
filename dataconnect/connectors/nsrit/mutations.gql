) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, ((u.role == 'PRINCIPAL' || u.role == 'principal' || u.role == 'BRANCH_ADMIN' || u.role == 'branch_admin') && u.branchId == vars.branchId) || u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Branch leadership required to seed classes") {
      id
