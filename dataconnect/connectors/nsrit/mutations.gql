mutation AssignTeacherClassTeacher(
  $sectionId: UUID!
  $teacherId: UUID!
  $teacherUserId: UUID!
  $branchId: UUID!
  $sectionAuditId: String
  $teacherAuditId: String
) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {
        _and: [
          {firebaseUID: {eq_expr: "auth.uid"}}
          {isActive: {eq: true}}
          {
            _or: [
              {role: {in: ["MAIN_ADMIN", "main_admin"]}}
              {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
              {branches_on_principal: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {branches_on_branchAdmin: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {coordinators_on_user: {exist: {branchId: {eq: $branchId}, isActive: {eq: true}}}}
              {
                _and: [
                  {branchId: {eq: $branchId}}
                  {
                    _or: [
                      {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}
                      {userRoles_on_user: {exist: {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}}}
                      ]
                  }
                ]
              }
            ]
          }
        ]
      }
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Class teacher assignment access required") {
      id
      role
      branchId
    }
    teacherSectionAssignments(
      where: {teacherId: {eq: $teacherId}, isClassTeacher: {eq: true}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "!this.exists(s, true)", message: "Teacher is already assigned as a class teacher") {
      id
    }
    currentSectionTeacher: teacherSectionAssignments(
      where: {sectionId: {eq: $sectionId}, isClassTeacher: {eq: true}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "!this.exists(s, true)", message: "This section already has a class teacher") {
      id
    }
    selectedTeacher: teachers(
      where: {id: {eq: $teacherId}, userId: {eq: $teacherUserId}, branchId: {eq: $branchId}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(t, true)", message: "Selected class teacher profile not found") {
      id
      userId
    }
  }
  teacherSectionAssignment_insert(
    data: {
      teacher: {id: $teacherId}
      section: {id: $sectionId}
      assignedById_expr: "response.query.users[0].id"
      isClassTeacher: true
      isActive: true
      updatedAt_expr: "request.time"
    }
  )
  section_update(
    id: $sectionId
    data: {
      classTeacher: {id: $teacherUserId}
      updatedAt_expr: "request.time"
    }
  )
  userRole_upsert(
    data: {
      user: {id: $teacherUserId}
      role: "CLASS_TEACHER"
    }
  )
  auditLog_insert(
    data: {
      performedBy_expr: "response.query.users[0].id"
      performedRole_expr: "response.query.users[0].role"
      action: "CLASS_TEACHER_ASSIGNED"
      entityType: "CLASS_TEACHER_ASSIGNMENT"
      entityId: $sectionAuditId
      branchId: $branchId
      oldData: null
      newData: $teacherAuditId
    }
  )
  roleAuditLog_insert: auditLog_insert(
    data: {
      user: {id: $teacherUserId}
      performedBy_expr: "response.query.users[0].id"
      performedRole_expr: "response.query.users[0].role"
      action: "ROLE_ADDED"
      entityType: "USER_ROLE"
      entityId_expr: "vars.teacherUserId"
      branchId: $branchId
      newRole: "CLASS_TEACHER"
      newData: "Class Teacher role ensured"
    }
  )
}

