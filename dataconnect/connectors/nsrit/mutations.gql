mutation CreateStudent(
  $studentId: String!
  $admissionYear: Int!
  $branchCode: String!
  $serialNumber: Int!
  $fullName: String!
  $gender: String
  $dateOfBirth: Date
  $photoUrl: String
  $aadhaarNumber: String
  $bloodGroup: String
  $branchId: UUID!
  $wingId: UUID
  $wingCode: String
  $academicClassId: UUID!
  $sectionId: UUID!
  $parentId: UUID!
  $countryCode: String
  $phoneNumber: String
  $address: String
  $city: String
  $state: String
  $pincode: String
  $emergencyContact: String
  $transportRequired: Boolean
  $admissionDate: Date!
) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, ((u.role == 'PRINCIPAL' || u.role == 'principal' || u.role == 'COORDINATOR' || u.role == 'coordinator' || u.role == 'BRANCH_ADMIN' || u.role == 'branch_admin') && u.branchId == vars.branchId) || u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Student creation access denied") {
      id
      role
      branchId
    }
    selectedClass: academicClasses(
      where: {id: {eq: $academicClassId}, branchId: {eq: $branchId}, wingId: {eq: $wingId}, wing: {code: {eq: $wingCode}}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(c, true)", message: "Selected class is not active for this branch") {
      id
      wingId
    }
    selectedSection: sections(
      where: {id: {eq: $sectionId}, branchId: {eq: $branchId}, academicClassId: {eq: $academicClassId}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(s, true)", message: "Selected section is not active for this class") {
      id
    }
  }
  studentIdSequence_upsert(
    data: {
      admissionYear: $admissionYear
      branchCode: $branchCode
      lastSerialNumber: $serialNumber
      updatedAt_expr: "request.time"
    }
  )
  studentSequence_upsert(
    data: {
      year: $admissionYear
      branchCode: $branchCode
      lastSerial: $serialNumber
      updatedAt_expr: "request.time"
    }
  )
  student_insert(
    data: {
      studentId: $studentId
      admissionYear: $admissionYear
      branchCode: $branchCode
      serialNumber: $serialNumber
      fullName: $fullName
      gender: $gender
      dateOfBirth: $dateOfBirth
      photoUrl: $photoUrl
      aadhaarNumber: $aadhaarNumber
      bloodGroup: $bloodGroup
      branch: {id: $branchId}
      wing: {id: $wingId}
      academicClass: {id: $academicClassId}
      section: {id: $sectionId}
      parent: {id: $parentId}
      countryCode: $countryCode
      phoneNumber: $phoneNumber
      address: $address
      city: $city
      state: $state
      pincode: $pincode
      emergencyContact: $emergencyContact
      transportRequired: $transportRequired
      admissionDate: $admissionDate
      status: "ACTIVE"
      isActive: true
      updatedAt_expr: "request.time"
    }
  )
  auditLog_insert(
    data: {
      performedBy_expr: "response.query.users[0].id"
      performedRole_expr: "response.query.users[0].role"
      action: "STUDENT_CREATED"
      entityType: "STUDENT"
      entityId: $studentId
      branchId: $branchId
      newData: "Student created"
    }
  )
}

