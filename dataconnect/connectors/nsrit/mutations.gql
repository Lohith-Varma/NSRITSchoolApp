mutation EnsureCoordinatorTeacherProfile(
  $userId: UUID!
  $branchId: UUID!
  $employeeId: String!
  $staffType: String! = "TEACHING"
  $joiningDate: Date!
  $designation: String! = "Class Teacher"
  $gender: String! = "Other"
  $email: String
) @auth(level: USER) @transaction {
  query @redact {
    currentUser: users(
      where: {
        _and: [
          {firebaseUID: {eq_expr: "auth.uid"}}
          {isActive: {eq: true}}
          {
            _or: [
              {role: {in: ["MAIN_ADMIN", "main_admin"]}}
              {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
              {branches_on_principal: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {branches_on_branchAdmin: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {coordinators_on_user: {exist: {branchId: {eq: $branchId}, isActive: {eq: true}}}}
              {
                _and: [
                  {branchId: {eq: $branchId}}
                  {
                    _or: [
                      {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}
                      {userRoles_on_user: {exist: {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}}}
                      ]
                  }
                ]
              }
            ]
          }
        ]
      }
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Coordinator teacher profile access required") {
      id
      role
      branchId
    }
    targetUser: users(
      where: {id: {eq: $userId}, branchId: {eq: $branchId}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Coordinator user not found in branch") {
      id
    }
    targetCoordinator: coordinators(
      where: {userId: {eq: $userId}, branchId: {eq: $branchId}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(c, true)", message: "Active coordinator profile required") {
      id
    }
    existingTeacher: teachers(
      where: {userId: {eq: $userId}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "!this.exists(t, true)", message: "Teacher profile already exists") {
      id
    }
  }
  teacher_insert(
    data: {
      user: {id: $userId}
      branch: {id: $branchId}
      employeeId: $employeeId
      staffType: $staffType
      joiningDate: $joiningDate
      designation: $designation
      gender: $gender
      email: $email
      isActive: true
      updatedAt_expr: "request.time"
    }
  )
  auditLog_insert(
    data: {
      user: {id: $userId}
      performedBy_expr: "response.query.currentUser[0].id"
      performedRole_expr: "response.query.currentUser[0].role"
      action: "TEACHER_PROFILE_CREATED"
      entityType: "TEACHER"
      entityId_expr: "response.teacher_insert.id"
      branchId: $branchId
      newData: "Coordinator teacher profile created for class teacher assignment"
    }
  )
}

mutation UpdateClassTeacherAssignment(
  $assignmentId: UUID!
  $oldSectionId: UUID!
  $sectionId: UUID!
  $teacherId: UUID!
  $teacherUserId: UUID!
  $branchId: UUID!
  $oldTeacherId: UUID
  $sectionAuditId: String!
  $teacherAuditId: String!
  $oldTeacherAuditId: String
) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {
        _and: [
          {firebaseUID: {eq_expr: "auth.uid"}}
          {isActive: {eq: true}}
          {
            _or: [
              {role: {in: ["MAIN_ADMIN", "main_admin"]}}
              {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
              {branches_on_principal: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {branches_on_branchAdmin: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {coordinators_on_user: {exist: {branchId: {eq: $branchId}, isActive: {eq: true}}}}
              {
                _and: [
                  {branchId: {eq: $branchId}}
                  {
                    _or: [
                      {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}
                      {userRoles_on_user: {exist: {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}}}
                      ]
                  }
                ]
              }
            ]
          }
        ]
      }
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Class teacher assignment access required") {
      id
      role
      branchId
    }
    teacherConflicts: teacherSectionAssignments(
      where: {teacherId: {eq: $teacherId}, id: {ne: $assignmentId}, isClassTeacher: {eq: true}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "!this.exists(s, true)", message: "Teacher is already assigned as a class teacher") {
      id
    }
    sectionConflicts: teacherSectionAssignments(
      where: {sectionId: {eq: $sectionId}, id: {ne: $assignmentId}, isClassTeacher: {eq: true}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "!this.exists(s, true)", message: "This section already has a class teacher") {
      id
    }
    selectedTeacher: teachers(
      where: {id: {eq: $teacherId}, userId: {eq: $teacherUserId}, branchId: {eq: $branchId}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(t, true)", message: "Selected class teacher profile not found") {
      id
      userId
    }
  }
  teacherSectionAssignment_update(
    id: $assignmentId
    data: {
      isActive: false
      updatedAt_expr: "request.time"
    }
  )
  oldSection_update: section_update(
    id: $oldSectionId
    data: {
      classTeacher: null
      updatedAt_expr: "request.time"
    }
  )
  teacherSectionAssignment_insert(
    data: {
      teacher: {id: $teacherId}
      section: {id: $sectionId}
      assignedById_expr: "response.query.users[0].id"
      isClassTeacher: true
      isActive: true
      updatedAt_expr: "request.time"
    }
  )
  section_update(
    id: $sectionId
    data: {
      classTeacher: {id: $teacherUserId}
      updatedAt_expr: "request.time"
    }
  )
  userRole_upsert(
    data: {
      user: {id: $teacherUserId}
      role: "CLASS_TEACHER"
    }
  )
  oldClassTeacherRole_delete: userRole_deleteMany(
    where: {
      role: {eq: "CLASS_TEACHER"}
      user: {
        teacher_on_user: {
          id: {eq: $oldTeacherId}
          teacherSectionAssignments_on_teacher: {
            count: {eq: 0}
            exist: {isClassTeacher: {eq: true}, isActive: {eq: true}}
          }
        }
      }
    }
  )
  auditLog_insert(
    data: {
      performedBy_expr: "response.query.users[0].id"
      performedRole_expr: "response.query.users[0].role"
      action: "CLASS_TEACHER_CHANGED"
      entityType: "CLASS_TEACHER_ASSIGNMENT"
      entityId: $sectionAuditId
      branchId: $branchId
      oldData: $oldTeacherAuditId
      newData: $teacherAuditId
    }
  )
  roleAuditLog_insert: auditLog_insert(
    data: {
      user: {id: $teacherUserId}
      performedBy_expr: "response.query.users[0].id"
      performedRole_expr: "response.query.users[0].role"
      action: "ROLE_ADDED"
      entityType: "USER_ROLE"
      entityId_expr: "vars.teacherUserId"
      branchId: $branchId
      newRole: "CLASS_TEACHER"
      newData: "Class Teacher role ensured"
    }
  )
}

