mutation AddParentRole($userId: UUID!, $branchId: UUID) @auth(level: USER) @transaction {
  query @redact {
    currentUser: users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, ((u.role == 'PRINCIPAL' || u.role == 'principal' || u.role == 'COORDINATOR' || u.role == 'coordinator' || u.role == 'BRANCH_ADMIN' || u.role == 'branch_admin') && u.branchId == vars.branchId) || u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Parent role assignment denied") {
      id
      role
      branchId
    }
  }
  userRole_upsert(
    data: {
      user: {id: $userId}
      role: "PARENT"
    }
  )
  auditLog_insert(
    data: {
      user: {id: $userId}
      performedBy_expr: "response.query.currentUser[0].id"
      performedRole_expr: "response.query.currentUser[0].role"
      action: "ROLE_ADDED"
      entityType: "USER_ROLE"
      entityId_expr: "vars.userId"
      branchId: $branchId
      newRole: "PARENT"
      newData: "Parent role added"
    }
  )
}

mutation SwitchRole($userId: UUID!, $oldRole: String!, $newRole: String!) @auth(level: USER) @transaction {
  query @redact {
    currentUser: users(
      where: {id: {eq: $userId}, firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Role switch denied") {
      id
      role
    }
    selectedRole: userRoles(
      where: {userId: {eq: $userId}, role: {eq: $newRole}}
      limit: 1
    ) @check(expr: "this.exists(r, true)", message: "Role is not assigned to this user") {
      id
      role
    }
  }
  auditLog_insert(
    data: {
      user: {id: $userId}
      performedBy_expr: "response.query.currentUser[0].id"
      performedRole: $oldRole
      actingAs: $newRole
      action: "ROLE_SWITCHED"
      entityType: "USER"
      entityId_expr: "vars.userId"
      oldRole: $oldRole
      newRole: $newRole
      oldData: $oldRole
      newData: $newRole
    }
  )
}

mutation LinkStudentParent(
  $studentId: UUID!
  $userId: UUID!
