mutation AssignClassTeacher($sectionId: UUID!, $teacherId: UUID!) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, u.role == 'PRINCIPAL' || u.role == 'principal')", message: "Principal required") {
      id
      role
    }
    sections(
      where: {classTeacherId: {eq: $teacherId}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "!this.exists(s, true)", message: "Teacher is already assigned as a class teacher") {
      id
    }
  }
  section_update(
    id: $sectionId
    data: {
      classTeacher: {id: $teacherId}
      updatedAt_expr: "request.time"
    }
  )
}

