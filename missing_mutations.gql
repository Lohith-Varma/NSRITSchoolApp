mutation ClearTeacherSubjects($teacherId: UUID!, $branchId: UUID!) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, ((u.role == 'PRINCIPAL' || u.role == 'principal' || u.role == 'COORDINATOR' || u.role == 'coordinator') && u.branchId == vars.branchId) || u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Subject assignment access required") {
      id
      role
      branchId
    }
  }
  teacherSubject_deleteMany(where: {teacherId: {eq: $teacherId}})
}
